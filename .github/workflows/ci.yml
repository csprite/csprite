name: ci

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
      with:
        submodules: 'true'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install cmake ninja-build libsdl2-dev libsdl2-2.0-0

    - name: Generate Build Files & Build
      run: |
        cmake -S ./ -B ./build/ -DCMAKE_BUILD_TYPE=$(BUILD_TYPE) -G "Ninja"
        cmake --build ./build/

    - name: Upload artifacts
      uses: actions/upload-artifact@v2
      with:
        name: csprite-dev-linux-x86_64
        path: ./build/csprite

